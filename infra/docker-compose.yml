version: '3.8'
services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: med_broker
    ports:
      - "5672:5672" # Porta da fila
      - "15672:15672" # Painel administrativo
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin

  postgres:
    image: postgres:15
    container_name: med_db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: med_app_db
    ports:
      - "5432:5432"